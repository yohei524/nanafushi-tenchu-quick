<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001428;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002548;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)" rx="80" ry="80"/>
  <!-- 外周金円 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#c8a96e" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.3"/>
  <!-- 陰陽マーク -->
  <g transform="translate(256,256)">
    <circle r="120" fill="#001428" stroke="#c8a96e" stroke-width="3"/>
    <path d="M 0,-120 A 60,60 0 0 1 0,0 A 60,60 0 0 0 0,120 A 120,120 0 0 1 0,-120 Z" fill="#f8f6f2"/>
    <circle cx="0" cy="-60" r="12" fill="#001428"/>
    <circle cx="0" cy="60" r="12" fill="#f8f6f2"/>
  </g>
  <!-- 㐂の字 -->
  <text x="256" y="440" text-anchor="middle" font-family="serif" font-size="60" fill="#c8a96e" font-weight="200" letter-spacing="4">㐂の暦</text>
</svg>